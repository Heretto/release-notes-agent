version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: release-notes-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: release_notes_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d release_notes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: release-notes-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass devpassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=devpassword redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: release-notes-mailpit
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: release-notes-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/release_notes_db
      REDIS_URL: redis://:devpassword@redis:6379/0
      APP_ENV: development
      APP_SECRET_KEY: ${APP_SECRET_KEY:-development-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-development-jwt-key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-development-encryption-key}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TEST_CLAUDE_API_KEY: ${TEST_CLAUDE_API_KEY}
      TEST_CLAUDE_MODEL: ${TEST_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      TEST_OPENAI_API_KEY: ${TEST_OPENAI_API_KEY}
      TEST_OPENAI_MODEL: ${TEST_OPENAI_MODEL:-gpt-4o-mini}
      TEST_GOOGLE_MODEL: ${TEST_GOOGLE_MODEL:-gemini-2.0-flash}
      JIRA_WEBHOOK_SECRET: ${JIRA_WEBHOOK_SECRET:-webhook-secret}
      HERETTO_BASE_URL: ${HERETTO_BASE_URL:-https://api.heretto.com}
      CORS_ORIGINS: http://localhost:4200
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@release-notes.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:4200}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: release-notes-celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/release_notes_db
      REDIS_URL: redis://:devpassword@redis:6379/0
      APP_ENV: development
      APP_SECRET_KEY: ${APP_SECRET_KEY:-development-secret-key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-development-encryption-key}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      HERETTO_BASE_URL: ${HERETTO_BASE_URL:-https://api.heretto.com}
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: release-notes-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_BASE_URL=http://localhost:8000/api/v1

volumes:
  postgres_data:
  redis_data: