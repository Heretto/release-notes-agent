version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: release-notes-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-produser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-release_notes_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-produser} -d ${POSTGRES_DB:-release_notes_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

  redis:
    image: redis:7-alpine
    container_name: release-notes-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  smtp:
    image: namshi/smtp:latest
    container_name: release-notes-smtp
    restart: always
    environment:
      MAILNAME: ${DOMAIN:-localhost}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: release-notes-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      smtp:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-produser}:${POSTGRES_PASSWORD:?error}@postgres:5432/${POSTGRES_DB:-release_notes_production}
      REDIS_URL: redis://:${REDIS_PASSWORD:?error}@redis:6379/0
      APP_ENV: production
      APP_SECRET_KEY: ${APP_SECRET_KEY:?error}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?error}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?error}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      JIRA_WEBHOOK_SECRET: ${JIRA_WEBHOOK_SECRET}
      HERETTO_BASE_URL: ${HERETTO_BASE_URL:-https://api.heretto.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
      SMTP_HOST: ${SMTP_HOST:-smtp}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@${DOMAIN:-localhost}}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://${DOMAIN:-localhost}}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:8000}
    container_name: release-notes-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: release-notes-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx-production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployment/ssl:/etc/nginx/ssl:ro
      - ./deployment/certbot/www:/var/www/certbot:ro
      - ./deployment/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge